name: NYC Running Events Finder - Claude Agent

on:
  schedule:
    # Run every Friday at 5:00 PM UTC
    - cron: '0 17 * * 5'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  find-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Claude Events Finder Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python run_agent.py

      - name: Log completion
        if: success()
        run: echo "✅ Claude agent completed event search and sent email"

      - name: Log failure
        if: failure()
        run: echo "❌ Claude agent failed - check logs above"
